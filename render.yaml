# Render blueprient for AI Career Copilot
# Deploys the backend as a Web Service + PostgreSQL database

services:
  # ── Backend API ──
  - type: web
    name: ai-career-copilot-api
    runtime: docker
    repo: https://github.com/Arbaz0212/AI-Career-Copilot
    dockerfilePath: ./Dockerfile
    branch: main
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-career-copilot-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://ai-career-copilot.vercel.app # Change after frontend deploy
      - key: GROQ_API_KEY_1
        sync: false
      - key: GROQ_API_KEY_2
        sync: false
      - key: GROQ_API_KEY_3
        sync: false
      - key: GROQ_API_KEY_4
        sync: false
      - key: GROQ_API_KEY_5
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

databases:
  - name: ai-career-copilot-db
    databaseName: ai_career_copilot
    plan: free
